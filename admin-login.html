<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Eleo</title>
    <style>
        /* --- CSS RESET & MASTER BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-gold: #D4AF37;
            --text-light: #FFFFFF;
            --text-muted: #CCCCCC;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- LOGIN PANEL LAYOUT --- */
        .login-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: border-color 0.4s ease;
        }

        .login-card:hover {
            border-color: var(--primary-gold);
        }

        .logo {
            color: var(--primary-gold);
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
        }

        /* --- FORM CONTROLS --- */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px;
            background-color: #121212;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-light);
            font-size: 1.1rem;
            letter-spacing: 3px;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-gold);
        }

        /* --- INTERACTIVE BUTTON --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-gold);
            color: #000000;
            border: 2px solid var(--primary-gold);
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: transparent;
            color: var(--primary-gold);
        }

        /* --- SYSTEM FEEDBACK --- */
        .error-message {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">ELEO</div>
        <h2>Administrative Gate</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="adminPassword">Master Security Token</label>
                <input type="password" id="adminPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Verify Identity</button>
            <div class="error-message" id="errorMsg">Authentication rejected. Token invalid.</div>
        </form>
    </div>

    <script src="admin-login.js"></script>
</body>
</html>
